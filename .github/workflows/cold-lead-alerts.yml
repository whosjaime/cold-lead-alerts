name: Cold Lead Alerts

on:
  schedule:
    - cron: "*/30 14-23 * * *"  # 9:00 AM-7:30 PM EST/EDT
    - cron: "*/30 0-2 * * *"    # 8:00 PM-10:30 PM EST/EDT
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cold-lead-alerts
  cancel-in-progress: true

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run job monitor
        env:
          YTJOBS_WEBHOOK_URL: ${{ secrets.YTJOBS_WEBHOOK_URL }}
          ROSTER_WEBHOOK_URL: ${{ secrets.ROSTER_WEBHOOK_URL }}
          WEBHOOK_AVATAR_URL: ${{ secrets.WEBHOOK_AVATAR_URL }}
        run: python creator_job_alerts.py

      - name: Upload roster debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: roster-debug
          path: |
            roster_debug.html
            roster_debug.txt
          if-no-files-found: ignore

      - name: Commit seen jobs file
        if: always()
        run: |
          touch seen_jobs.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add seen_jobs.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update seen jobs"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
