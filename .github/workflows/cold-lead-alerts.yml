name: Cold Lead Alerts

on:
  schedule:
    - cron: "*/30 14-23 * * *"
    - cron: "*/30 0-2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cold-lead-alerts
  cancel-in-progress: false

jobs:
  run-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Debug webhook and Monday presence
        env:
          YTJOBS_WEBHOOK_URL: ${{ secrets.YTJOBS_WEBHOOK_URL }}
          ROSTER_WEBHOOK_URL: ${{ secrets.ROSTER_WEBHOOK_URL }}
          YT_CAREERS_WEBHOOK_URL: ${{ secrets.YT_CAREERS_WEBHOOK_URL }}
          BOC_WEBHOOK_URL: ${{ secrets.BOC_WEBHOOK_URL }}

          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_BOARD_ID: ${{ secrets.MONDAY_BOARD_ID }}
          MONDAY_GROUP_ID: ${{ secrets.MONDAY_GROUP_ID }}
          MONDAY_COL_PAY: ${{ secrets.MONDAY_COL_PAY }}
          MONDAY_COL_TYPE: ${{ secrets.MONDAY_COL_TYPE }}
          MONDAY_COL_EMAIL: ${{ secrets.MONDAY_COL_EMAIL }}
          MONDAY_COL_PRIMARY_SKILL: ${{ secrets.MONDAY_COL_PRIMARY_SKILL }}
          MONDAY_COL_PLATFORM: ${{ secrets.MONDAY_COL_PLATFORM }}
          MONDAY_COL_SOURCED_FROM: ${{ secrets.MONDAY_COL_SOURCED_FROM }}
          MONDAY_COL_CATEGORY: ${{ secrets.MONDAY_COL_CATEGORY }}
          MONDAY_COL_COMPANY: ${{ secrets.MONDAY_COL_COMPANY }}
          MONDAY_COL_ROLE: ${{ secrets.MONDAY_COL_ROLE }}
          MONDAY_COL_LOCATION: ${{ secrets.MONDAY_COL_LOCATION }}
          MONDAY_COL_DESCRIPTION: ${{ secrets.MONDAY_COL_DESCRIPTION }}
          MONDAY_COL_LINK: ${{ secrets.MONDAY_COL_LINK }}
          MONDAY_COL_POST_DATE: ${{ secrets.MONDAY_COL_POST_DATE }}
        run: |
          if [ -z "$YTJOBS_WEBHOOK_URL" ]; then echo "YTJOBS_WEBHOOK_URL is missing"; else echo "YTJOBS_WEBHOOK_URL is set"; fi
          if [ -z "$ROSTER_WEBHOOK_URL" ]; then echo "ROSTER_WEBHOOK_URL is missing"; else echo "ROSTER_WEBHOOK_URL is set"; fi
          if [ -z "$YT_CAREERS_WEBHOOK_URL" ]; then echo "YT_CAREERS_WEBHOOK_URL is missing"; else echo "YT_CAREERS_WEBHOOK_URL is set"; fi
          if [ -z "$BOC_WEBHOOK_URL" ]; then echo "BOC_WEBHOOK_URL is missing"; else echo "BOC_WEBHOOK_URL is set"; fi

          if [ -z "$MONDAY_API_TOKEN" ]; then echo "MONDAY_API_TOKEN is missing"; else echo "MONDAY_API_TOKEN is set"; fi
          if [ -z "$MONDAY_BOARD_ID" ]; then echo "MONDAY_BOARD_ID is missing"; else echo "MONDAY_BOARD_ID is set"; fi
          if [ -z "$MONDAY_GROUP_ID" ]; then echo "MONDAY_GROUP_ID is missing (optional)"; else echo "MONDAY_GROUP_ID is set"; fi
          if [ -z "$MONDAY_COL_PAY" ]; then echo "MONDAY_COL_PAY is missing"; else echo "MONDAY_COL_PAY is set"; fi
          if [ -z "$MONDAY_COL_TYPE" ]; then echo "MONDAY_COL_TYPE is missing"; else echo "MONDAY_COL_TYPE is set"; fi
          if [ -z "$MONDAY_COL_EMAIL" ]; then echo "MONDAY_COL_EMAIL is missing"; else echo "MONDAY_COL_EMAIL is set"; fi
          if [ -z "$MONDAY_COL_PRIMARY_SKILL" ]; then echo "MONDAY_COL_PRIMARY_SKILL is missing"; else echo "MONDAY_COL_PRIMARY_SKILL is set"; fi
          if [ -z "$MONDAY_COL_PLATFORM" ]; then echo "MONDAY_COL_PLATFORM is missing"; else echo "MONDAY_COL_PLATFORM is set"; fi
          if [ -z "$MONDAY_COL_SOURCED_FROM" ]; then echo "MONDAY_COL_SOURCED_FROM is missing"; else echo "MONDAY_COL_SOURCED_FROM is set"; fi
          if [ -z "$MONDAY_COL_CATEGORY" ]; then echo "MONDAY_COL_CATEGORY is missing"; else echo "MONDAY_COL_CATEGORY is set"; fi
          if [ -z "$MONDAY_COL_COMPANY" ]; then echo "MONDAY_COL_COMPANY is missing"; else echo "MONDAY_COL_COMPANY is set"; fi
          if [ -z "$MONDAY_COL_ROLE" ]; then echo "MONDAY_COL_ROLE is missing"; else echo "MONDAY_COL_ROLE is set"; fi
          if [ -z "$MONDAY_COL_LOCATION" ]; then echo "MONDAY_COL_LOCATION is missing"; else echo "MONDAY_COL_LOCATION is set"; fi
          if [ -z "$MONDAY_COL_DESCRIPTION" ]; then echo "MONDAY_COL_DESCRIPTION is missing"; else echo "MONDAY_COL_DESCRIPTION is set"; fi
          if [ -z "$MONDAY_COL_LINK" ]; then echo "MONDAY_COL_LINK is missing"; else echo "MONDAY_COL_LINK is set"; fi
          if [ -z "$MONDAY_COL_POST_DATE" ]; then echo "MONDAY_COL_POST_DATE is missing"; else echo "MONDAY_COL_POST_DATE is set"; fi

      - name: Run job monitor
        env:
          YTJOBS_WEBHOOK_URL: ${{ secrets.YTJOBS_WEBHOOK_URL }}
          ROSTER_WEBHOOK_URL: ${{ secrets.ROSTER_WEBHOOK_URL }}
          YT_CAREERS_WEBHOOK_URL: ${{ secrets.YT_CAREERS_WEBHOOK_URL }}
          BOC_WEBHOOK_URL: ${{ secrets.BOC_WEBHOOK_URL }}
          WEBHOOK_AVATAR_URL: ${{ secrets.WEBHOOK_AVATAR_URL }}

          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          MONDAY_BOARD_ID: ${{ secrets.MONDAY_BOARD_ID }}
          MONDAY_GROUP_ID: ${{ secrets.MONDAY_GROUP_ID }}

          MONDAY_COL_PAY: ${{ secrets.MONDAY_COL_PAY }}
          MONDAY_COL_TYPE: ${{ secrets.MONDAY_COL_TYPE }}
          MONDAY_COL_EMAIL: ${{ secrets.MONDAY_COL_EMAIL }}
          MONDAY_COL_PRIMARY_SKILL: ${{ secrets.MONDAY_COL_PRIMARY_SKILL }}
          MONDAY_COL_PLATFORM: ${{ secrets.MONDAY_COL_PLATFORM }}
          MONDAY_COL_SOURCED_FROM: ${{ secrets.MONDAY_COL_SOURCED_FROM }}
          MONDAY_COL_CATEGORY: ${{ secrets.MONDAY_COL_CATEGORY }}
          MONDAY_COL_COMPANY: ${{ secrets.MONDAY_COL_COMPANY }}
          MONDAY_COL_ROLE: ${{ secrets.MONDAY_COL_ROLE }}
          MONDAY_COL_LOCATION: ${{ secrets.MONDAY_COL_LOCATION }}
          MONDAY_COL_DESCRIPTION: ${{ secrets.MONDAY_COL_DESCRIPTION }}
          MONDAY_COL_LINK: ${{ secrets.MONDAY_COL_LINK }}
          MONDAY_COL_POST_DATE: ${{ secrets.MONDAY_COL_POST_DATE }}
        run: python creator_job_alerts.py

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-debug
          path: |
            roster_debug.html
            roster_debug.txt
            ytcareers_debug.html
            ytcareers_debug.txt
            boc_debug.html
            boc_debug.txt
          if-no-files-found: ignore

      - name: Commit queue state
        if: always()
        run: |
          touch pending_jobs.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pending_jobs.json
          git rm -f --ignore-unmatch seen_jobs.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update job queue state"
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}" || true
          fi
